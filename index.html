<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartMove 🚌</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; }
    .app { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 2rem; font-weight: 700; color: #1a73e8; }
    header p { color: #666; margin-top: 0.25rem; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; }
    .search-bar input { flex: 1; padding: 0.75rem 1rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
    .search-bar input:focus { border-color: #1a73e8; }
    .search-bar button { padding: 0.75rem 1.25rem; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    .search-bar button:hover { background: #1558b0; }
    .search-bar button:disabled { background: #aaa; cursor: not-allowed; }
    .error { color: #c62828; background: #ffebee; padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; }
    .section-title { font-size: 1rem; color: #555; margin-bottom: 0.75rem; }
    .stop-card { background: white; border: 1px solid #e0e0e0; border-radius: 10px; padding: 0.875rem 1rem; margin-bottom: 0.5rem; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: box-shadow 0.15s; }
    .stop-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .stop-code { background: #e8f0fe; color: #1a73e8; font-size: 0.8rem; font-weight: 600; padding: 4px 8px; border-radius: 6px; white-space: nowrap; }
    .stop-name { font-weight: 500; flex: 1; }
    .stop-road { font-size: 0.85rem; color: #888; }
    .arrivals-section h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.25rem; }
    .stop-meta { color: #888; font-size: 0.9rem; margin-bottom: 1.25rem; }
    .back-btn { background: none; border: none; color: #1a73e8; cursor: pointer; font-size: 0.9rem; margin-bottom: 1rem; padding: 0; }
    .loading, .empty { color: #888; text-align: center; padding: 2rem 0; }
    .arrivals-table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; border: 1px solid #e0e0e0; }
    .arrivals-table th { background: #f9f9f9; padding: 0.75rem 1rem; text-align: left; font-size: 0.85rem; color: #555; font-weight: 500; border-bottom: 1px solid #e0e0e0; }
    .arrivals-table td { padding: 0.875rem 1rem; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
    .arrivals-table tr:last-child td { border-bottom: none; }
    .bus-no { font-weight: 700; font-size: 1rem; color: #1a73e8; }
    .load-sea { color: #2e7d32; font-size: 0.82rem; font-weight: 500; }
    .load-sda { color: #e65100; font-size: 0.82rem; font-weight: 500; }
    .load-lsd { color: #b71c1c; font-size: 0.82rem; font-weight: 500; }
    .load-unknown { color: #888; font-size: 0.82rem; }
    #stop-list, #arrivals-section { display: none; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>🚌 SmartMove</h1>
    <p>Real-time bus arrivals for Singapore</p>
  </header>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Search bus stop (e.g. Tampines, 83139)" />
    <button id="search-btn">Search</button>
  </div>

  <div id="error-msg" class="error" style="display:none;"></div>

  <div id="stop-list">
    <p class="section-title">Select a stop</p>
    <div id="stops-container"></div>
  </div>

  <div id="arrivals-section">
    <button class="back-btn" id="back-btn">← Back</button>
    <h2 id="stop-title"></h2>
    <p class="stop-meta" id="stop-meta"></p>
    <p class="loading" id="arrivals-loading" style="display:none;">Fetching arrivals...</p>
    <p class="empty" id="arrivals-empty" style="display:none;">No services found for this stop.</p>
    <table class="arrivals-table" id="arrivals-table" style="display:none;">
      <thead>
        <tr>
          <th>Bus</th>
          <th>Next</th>
          <th>Following</th>
          <th>Load</th>
        </tr>
      </thead>
      <tbody id="arrivals-body"></tbody>
    </table>
  </div>
</div>

<script>
  const API_KEY = "8l+29ucQQDeL6F/EDCIJPA==";
  const CORS_PROXY = "https://corsproxy.io/?";

  function getMinutes(isoString) {
    if (!isoString) return "—";
    const diff = (new Date(isoString) - new Date()) / 1000 / 60;
    if (diff < 0) return "Arr";
    return Math.round(diff) + " min";
  }

  function loadClass(load) {
    return { SEA: "load-sea", SDA: "load-sda", LSD: "load-lsd" }[load] || "load-unknown";
  }

  function loadText(load) {
    return { SEA: "Seats available", SDA: "Standing", LSD: "Limited standing" }[load] || "—";
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = msg ? "block" : "none";
  }

  async function searchStops() {
    const query = document.getElementById("search-input").value.trim();
    if (!query) return;

    showError("");
    document.getElementById("stop-list").style.display = "none";
    document.getElementById("arrivals-section").style.display = "none";
    document.getElementById("search-btn").disabled = true;
    document.getElementById("search-btn").textContent = "Searching...";

    try {
      const url = CORS_PROXY + encodeURIComponent(
        "https://datamall2.mytransport.sg/ltaodataservice/BusStops?$skip=0"
      );
      const res = await fetch(url, { headers: { AccountKey: API_KEY } });
      const data = await res.json();

      const filtered = data.value.filter(s =>
        s.Description.toLowerCase().includes(query.toLowerCase()) ||
        s.BusStopCode.includes(query)
      ).slice(0, 15);

      const container = document.getElementById("stops-container");
      container.innerHTML = "";

      if (filtered.length === 0) {
        showError("No stops found. Try a different name or stop code.");
      } else {
        filtered.forEach(stop => {
          const card = document.createElement("div");
          card.className = "stop-card";
          card.innerHTML = `
            <span class="stop-code">${stop.BusStopCode}</span>
            <span class="stop-name">${stop.Description}</span>
            <span class="stop-road">${stop.RoadName}</span>
          `;
          card.addEventListener("click", () => fetchArrivals(stop));
          container.appendChild(card);
        });
        document.getElementById("stop-list").style.display = "block";
      }
    } catch (e) {
      showError("Could not fetch bus stops. Check your API key or internet connection.");
    } finally {
      document.getElementById("search-btn").disabled = false;
      document.getElementById("search-btn").textContent = "Search";
    }
  }

  async function fetchArrivals(stop) {
    document.getElementById("stop-list").style.display = "none";
    document.getElementById("arrivals-section").style.display = "block";
    document.getElementById("stop-title").textContent = stop.Description;
    document.getElementById("stop-meta").textContent = `${stop.RoadName} · Stop ${stop.BusStopCode}`;
    document.getElementById("arrivals-loading").style.display = "block";
    document.getElementById("arrivals-table").style.display = "none";
    document.getElementById("arrivals-empty").style.display = "none";
    showError("");

    try {
      const url = CORS_PROXY + encodeURIComponent(
        `https://datamall2.mytransport.sg/ltaodataservice/v3/BusArrival?BusStopCode=${stop.BusStopCode}`
      );
      const res = await fetch(url, { headers: { AccountKey: API_KEY } });
      const data = await res.json();
      const services = data.Services || [];

      document.getElementById("arrivals-loading").style.display = "none";

      if (services.length === 0) {
        document.getElementById("arrivals-empty").style.display = "block";
        return;
      }

      const tbody = document.getElementById("arrivals-body");
      tbody.innerHTML = "";
      services.forEach(svc => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="bus-no">${svc.ServiceNo}</td>
          <td>${getMinutes(svc.NextBus?.EstimatedArrival)}</td>
          <td>${getMinutes(svc.NextBus2?.EstimatedArrival)}</td>
          <td><span class="${loadClass(svc.NextBus?.Load)}">${loadText(svc.NextBus?.Load)}</span></td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById("arrivals-table").style.display = "table";
    } catch (e) {
      document.getElementById("arrivals-loading").style.display = "none";
      showError("Could not fetch arrivals. Check your API key.");
    }
  }

  document.getElementById("search-btn").addEventListener("click", searchStops);
  document.getElementById("search-input").addEventListener("keydown", e => {
    if (e.key === "Enter") searchStops();
  });
  document.getElementById("back-btn").addEventListener("click", () => {
    document.getElementById("arrivals-section").style.display = "none";
    document.getElementById("stop-list").style.display = "block";
  });
</script>
</body>
</html>
